{% extends 'news/base.html' %}

{% block title %}Register{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-success text-white"><h4 class="mb-0">Create Account</h4></div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" name="username" class="form-control" required
                               value="{{ username|default_if_none:'' }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" required
                               value="{{ email|default_if_none:'' }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password1" class="form-control" required>
                        <small class="text-muted">At least 8 characters</small>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Confirm Password</label>
                        <input type="password" name="password2" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Register as</label>
                        <select name="role" class="form-select" required>
                            <option value="reader" {% if role == 'reader' %}selected{% endif %}>
                                Reader
                            </option>
                            <option value="journalist" {% if role == 'journalist' %}selected{% endif %}>
                                Journalist
                            </option>
                            <option value="editor" {% if role == 'editor' %}selected{% endif %}>
                                Editor
                            </option>
                        </select>
                    </div>
                    {% if errors %}
                    <div class="alert alert-danger">
                        <ul class="mb-0">
                            {% for err in errors %}
                            <li>{{ err }}</li>
                            {% endfor %}
                        </ul>
                    </div>
                    {% endif %}
                    <button type="submit" class="btn btn-success w-100">Register</button>
                </form>
                <hr>
                <p class="text-center mb-0">Already have an account? <a href="{% url 'news:login' %}">Login</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
